<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LittenBot Receiver</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding: 50px 20px;
            transition: background-color 0.5s;
        }
        #status {
            font-size: 1.5rem;
            color: #ff5722;
            margin: 20px 0;
        }
        #startBtn {
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>🤖 LITTENBOT ONTVANGER 🤖</h1>
        <p>Zet je geluid op maximaal!</p>
        <button id="startBtn">Activeer LittenBot</button>
        <div id="status">Status: Stand-by (druk op start)</div>
    </div>

    <div id="active-screen" class="hidden">
        <p style="color: #222; font-size: 0.8rem;">LittenBot is actief. Scherm is vergrendeld via software.</p>
    </div>

    <!-- Stille lus (geen geluid) die alleen dient om de audio-sessie actief te houden,
         zodat het scherm niet in slaap valt. Dit is een minimaal, volledig stil WAV-bestand. -->
    <audio id="silentAudio" loop src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" style="display:none;"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5wRKFeQCXalqe61weyHDo6hq9THA6UT8",
            authDomain: "littenbot-app.firebaseapp.com",
            databaseURL: "https://littenbot-app-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "littenbot-app",
            storageBucket: "littenbot-app.firebasestorage.app",
            messagingSenderId: "156579405931",
            appId: "1:156579405931:web:fcb2c86a7f80a9acf4912e",
            measurementId: "G-L33K1EKJZC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const startBtn = document.getElementById('startBtn');
        const silentAudio = document.getElementById('silentAudio');
        const setupScreen = document.getElementById('setup-screen');
        const activeScreen = document.getElementById('active-screen');

        let geactiveerd = false;
        let laatstGelezenTijd = 0;
        let wakeLock = null;

        async function activeerWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log('Wake Lock mislukt: ', err.message);
            }
        }

        startBtn.addEventListener('click', async () => {
            try {
                silentAudio.volume = 0.01;
                await silentAudio.play();
            } catch (err) {
                console.log('Stille audio kon niet starten: ', err.message);
            }

            geactiveerd = true;
            await activeerWakeLock();

            setupScreen.classList.add('hidden');
            activeScreen.classList.remove('hidden');
            document.body.style.backgroundColor = "#000000";

            speak("LittenBot opgestart. Ik luister naar O I O!");
        });

        onValue(ref(db, 'littenbot/commando'), (snapshot) => {
            const data = snapshot.val();
            if (!data || !geactiveerd) return;

            if (data.tijd > laatstGelezenTijd) {
                laatstGelezenTijd = data.tijd;
                verwerkCommando(data.actie);
            }
        });

        // HIER WORDEN DE NIEUWE COMMANDO'S VERWERKT EN UITGESPROKEN
        function verwerkCommando(actie) {
            if (actie === 'dans') {
                speak("Piep boop! LittenBot activeert de robotdans. Kggzt, kggzt!");
            } else if (actie === 'oio_dans') {
                speak("De O I O-dans is geactiveerd! Shake die robot-heupen!");
            } else if (actie === 'papa') {
                speak("LittenBot waarschuwing! Loop direct naar papa toe.");
            } else if (actie === 'mama') {
                speak("LittenBot waarschuwing! Loop direct naar mama toe.");
            } else if (actie === 'naar_oio') {
                speak("LittenBot zoekt O I O. Ik kom nu direct naar je toe!");
            } else if (actie === 'rug') {
                speak("Snel! Spring op mijn rug voor een ritje!");
            } else if (actie === 'volg_oio') {
                speak("Doelwit vergrendeld! Ik volg O I O overal waar ze heen gaat.");
            } else if (actie === 'stop_volg_oio') {
                speak("Ik stop met het volgen van O I O. Systeem op stand-by.");
            } else {
                console.log('Onbekend commando ontvangen: ', actie);
            }
        }

        function speak(text) {
            try {
                // Onderbreek een lopende zin zodra er een nieuw commando binnenkomt,
                // zodat LittenBot altijd meteen op het laatste drukje reageert.
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                const nlVoice = voices.find(voice => voice.lang.startsWith('nl'));

                if (nlVoice) {
                    utterance.voice = nlVoice;
                }
                utterance.lang = 'nl-NL';
                utterance.rate = 1.0;

                window.speechSynthesis.speak(utterance);
            } catch (err) {
                console.log('Spraak mislukt: ', err.message);
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await activeerWakeLock();
            }
        });

        window.speechSynthesis.onvoiceschanged = () => {
            console.log("Stemmen geladen");
        };
    </script>
</body>
</html>
