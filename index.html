<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LittenBot Receiver</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding: 50px 20px;
            transition: background-color 0.5s;
        }
        #status {
            font-size: 1.5rem;
            color: #ff5722;
            margin: 20px 0;
        }
        #startBtn {
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
        }
        /* Verborgen klasse voor als de bot actief is */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>🤖 LITTENBOT ONTVANGER 🤖</h1>
        <p>Zet je geluid op maximaal!</p>
        <button id="startBtn">Activeer LittenBot</button>
        <div id="status">Status: Stand-by (druk op start)</div>
    </div>

    <div id="active-screen" class="hidden">
        <p style="color: #222; font-size: 0.8rem;">LittenBot is actief. Scherm is vergrendeld via software.</p>
    </div>

    <audio id="silentAudio" loop src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" style="display:none;"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        // Jouw unieke Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB5wRKFeQCXalqe61weyHDo6hq9THA6UT8",
            authDomain: "littenbot-app.firebaseapp.com",
            databaseURL: "https://littenbot-app-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "littenbot-app",
            storageBucket: "littenbot-app.firebasestorage.app",
            messagingSenderId: "156579405931",
            appId: "1:156579405931:web:fcb2c86a7f80a9acf4912e",
            measurementId: "G-L33K1EKJZC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const startBtn = document.getElementById('startBtn');
        const silentAudio = document.getElementById('silentAudio');
        const setupScreen = document.getElementById('setup-screen');
        const activeScreen = document.getElementById('active-screen');

        let geactiveerd = false;
        let laatstGelezenTijd = 0;
        let wakeLock = null;

        // Functie om te zorgen dat het scherm NIET uitgaat (Wake Lock)
        async function activeerWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Scherm blijft geforceerd aan!');
                }
            } catch (err) {
                console.log('Wake Lock mislukt: ', err.message);
            }
        }

        // Activeer LittenBot na klik
        startBtn.addEventListener('click', async () => {
            silentAudio.volume = 0.01; // Bijna onhoorbaar zacht beletje
            silentAudio.play();
            geactiveerd = true;
            
            // Scherm wakker houden inschakelen
            await activeerWakeLock();
            
            // Verberg de knoppen zodat je niks per ongeluk indrukt in je zak
            setupScreen.classList.add('hidden');
            activeScreen.classList.remove('hidden');

            // Maak de hele achtergrond gitzwart (OLED-besparing)
            document.body.style.backgroundColor = "#000000";

            speak("LittenBot opgestart. Ik luister naar O I O!");
        });

        // Luister live naar de database
        onValue(ref(db, 'littenbot/commando'), (snapshot) => {
            const data = snapshot.val();
            if (!data || !geactiveerd) return;

            // Alleen nieuwe acties uitspreken
            if (data.tijd > laatstGelezenTijd) {
                laatstGelezenTijd = data.tijd;
                verwerkCommando(data.actie);
            }
        });

        function verwerkCommando(actie) {
            if (actie === 'dans') {
                speak("Piep boop! LittenBot activeert de robotdans. Doe met mij mee op mijn rug!");
            } else if (actie === 'papa') {
                speak("LittenBot waarschuwing! Loop direct naar papa toe.");
            } else if (actie === 'mama') {
                speak("LittenBot waarschuwing! Loop direct naar mama toe.");
            } else if (actie === 'rug') {
                speak("Snel! Spring op mijn rug voor een ritje!");
            }
        }

        // Text-to-Speech met Nederlandse force
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const nlVoice = voices.find(voice => voice.lang.startsWith('nl'));
            
            if (nlVoice) {
                utterance.voice = nlVoice;
            }
            utterance.lang = 'nl-NL'; 
            utterance.rate = 1.0;
            
            window.speechSynthesis.speak(utterance);
        }

        // Zorg dat de Wake Lock hersteld wordt als je de browser minimaliseert en weer opent
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await activeerWakeLock();
            }
        });

        window.speechSynthesis.onvoiceschanged = () => {
            console.log("Stemmen geladen");
        };
    </script>
</body>
</html>
